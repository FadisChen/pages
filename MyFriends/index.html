<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f2e9">
  <meta name="description" content="MyFriends — 住在瀏覽器裡、記得你的 AI 朋友。">
  <title>MyFriends — 你的 AI 朋友</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主要導覽">
      <button class="brand" type="button" data-nav="home" aria-label="回到朋友列表">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i></span>
        <span>
          <strong>MyFriends</strong>
          <small>always close</small>
        </span>
      </button>

      <nav class="side-nav">
        <button type="button" class="nav-item" data-nav="settings">
          <span class="nav-icon" aria-hidden="true">⌁</span><span>偏好設定</span>
        </button>
        <button type="button" class="nav-item is-active" data-nav="home">
          <span class="nav-icon" aria-hidden="true">⌂</span><span>我的朋友</span>
        </button>
      </nav>

      <div class="privacy-note">
        <span class="privacy-dot" aria-hidden="true"></span>
        <div><strong>只留在這台裝置</strong><small>角色與記憶儲存在瀏覽器</small></div>
      </div>
    </aside>

    <main id="app" class="main-content" tabindex="-1"></main>

    <nav class="mobile-nav" aria-label="行動版導覽">
      <button type="button" class="is-active" data-nav="home"><span>⌂</span>朋友</button>
      <button type="button" data-nav="new"><span>＋</span>新增</button>
      <button type="button" data-nav="settings"><span>⌁</span>設定</button>
    </nav>
  </div>

  <dialog id="modal" class="modal"></dialog>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
